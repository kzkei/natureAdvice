name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      test-postgres:
        image: postgres:13
        env:
          POSTGRES_USER: natureadvice_test
          POSTGRES_PASSWORD: natureadvice_test
          POSTGRES_DB: natureadvice_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Go tests
        working-directory: ./api
        run: go test ./... -v